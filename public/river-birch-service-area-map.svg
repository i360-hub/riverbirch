<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 620" role="img" aria-label="River Birch Tree Service coverage map of Watauga County and the High Country, North Carolina">
  <title>River Birch Tree Service — Watauga County Service Area</title>
  <defs>
    <linearGradient id="rbSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F7F1DF"/>
      <stop offset="1" stop-color="#EFE6CC"/>
    </linearGradient>
    <radialGradient id="rbGlow" cx="50%" cy="46%" r="55%">
      <stop offset="0" stop-color="#2F7A43" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#2F7A43" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="820" height="620" rx="18" fill="url(#rbSky)"/>
  <rect x="0" y="0" width="820" height="620" rx="18" fill="url(#rbGlow)"/>

  <!-- County outline (stylized High Country / Watauga blob) -->
  <path d="M120 250
           C 150 160, 300 120, 400 135
           C 520 152, 640 150, 700 220
           C 748 275, 730 360, 680 410
           C 620 470, 520 490, 430 480
           C 330 470, 220 470, 165 405
           C 118 350, 100 305, 120 250 Z"
        fill="#12331E" fill-opacity="0.06" stroke="#12331E" stroke-opacity="0.35" stroke-width="2.5" stroke-dasharray="2 7" stroke-linecap="round"/>

  <!-- Ridge lines (Blue Ridge feel) -->
  <path d="M150 330 C 250 300, 340 345, 430 315 C 520 288, 610 330, 690 305" fill="none" stroke="#2F7A43" stroke-opacity="0.28" stroke-width="2"/>
  <path d="M170 375 C 270 350, 360 388, 450 360 C 540 335, 620 372, 690 350" fill="none" stroke="#2F7A43" stroke-opacity="0.2" stroke-width="2"/>

  <!-- Town dots + labels -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#233b2b">
    <g>
      <circle cx="300" cy="290" r="4.5" fill="#2F7A43"/><text x="300" y="278" text-anchor="middle" font-weight="600">Boone</text>
    </g>
    <g>
      <circle cx="360" cy="360" r="4" fill="#2F7A43"/><text x="360" y="381" text-anchor="middle">Blowing Rock</text>
    </g>
    <g>
      <circle cx="240" cy="320" r="4" fill="#2F7A43"/><text x="216" y="324" text-anchor="end">Vilas</text>
    </g>
    <g>
      <circle cx="215" cy="365" r="4" fill="#2F7A43"/><text x="200" y="382" text-anchor="end">Sugar Grove</text>
    </g>
    <g>
      <circle cx="270" cy="405" r="4" fill="#2F7A43"/><text x="270" y="424" text-anchor="middle">Valle Crucis</text>
    </g>
    <g>
      <circle cx="320" cy="420" r="4" fill="#2F7A43"/><text x="330" y="438" text-anchor="start">Foscoe</text>
    </g>
    <g>
      <circle cx="240" cy="450" r="4" fill="#2F7A43"/><text x="240" y="469" text-anchor="middle">Seven Devils</text>
    </g>
    <g>
      <circle cx="205" cy="240" r="4" fill="#2F7A43"/><text x="205" y="228" text-anchor="middle">Zionville</text>
    </g>
    <g>
      <circle cx="170" cy="280" r="4" fill="#2F7A43"/><text x="156" y="284" text-anchor="end">Trade</text>
    </g>
    <g>
      <circle cx="185" cy="215" r="4" fill="#2F7A43"/><text x="185" y="203" text-anchor="middle">Mabel</text>
    </g>
    <g>
      <circle cx="245" cy="265" r="4" fill="#2F7A43"/><text x="235" y="255" text-anchor="end">Cove Creek</text>
    </g>
    <g>
      <circle cx="345" cy="235" r="4" fill="#2F7A43"/><text x="345" y="223" text-anchor="middle">Meat Camp</text>
    </g>
    <g>
      <circle cx="330" cy="315" r="4" fill="#2F7A43"/><text x="345" y="309" text-anchor="start">Sands</text>
    </g>
    <g>
      <circle cx="385" cy="315" r="4" fill="#2F7A43"/><text x="398" y="312" text-anchor="start">Bamboo</text>
    </g>
    <g>
      <circle cx="405" cy="360" r="4" fill="#2F7A43"/><text x="418" y="364" text-anchor="start">Aho</text>
    </g>
    <g>
      <circle cx="470" cy="250" r="4" fill="#2F7A43"/><text x="470" y="238" text-anchor="middle">Todd</text>
    </g>
    <g>
      <circle cx="530" cy="285" r="4" fill="#2F7A43"/><text x="544" y="282" text-anchor="start">Triplett</text>
    </g>
    <g>
      <circle cx="560" cy="335" r="4" fill="#2F7A43"/><text x="574" y="339" text-anchor="start">Brownwood</text>
    </g>
    <g>
      <circle cx="590" cy="380" r="4" fill="#2F7A43"/><text x="604" y="384" text-anchor="start">Stony Fork</text>
    </g>
  </g>

  <!-- HQ pin: Deep Gap -->
  <g transform="translate(430 305)">
    <ellipse cx="0" cy="30" rx="20" ry="6" fill="#12331E" fill-opacity="0.18"/>
    <path d="M0 30 C -20 2, -18 -18, 0 -24 C 18 -18, 20 2, 0 30 Z" fill="#C8992E" stroke="#12331E" stroke-width="2"/>
    <circle cx="0" cy="-6" r="7.5" fill="#12331E"/>
    <text x="0" y="-38" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="800" fill="#12331E">Deep Gap</text>
    <text x="0" y="-54" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700" letter-spacing="0.08em" fill="#C8992E">OUR BASE</text>
  </g>

  <!-- Title block -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
    <text x="60" y="80" font-size="30" font-weight="800" fill="#12331E">Serving Watauga County</text>
    <text x="60" y="110" font-size="17" font-weight="600" fill="#2F7A43">&amp; the High Country — 24/7 Emergency Tree Service</text>
  </g>

  <!-- Legend -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#233b2b" transform="translate(60 540)">
    <path d="M6 -6 C -4 -20, -3 -30, 6 -33 C 15 -30, 16 -20, 6 -6 Z" fill="#C8992E" stroke="#12331E" stroke-width="1.5" transform="scale(0.7)"/>
    <text x="18" y="-8" font-weight="700" fill="#12331E">River Birch base (Deep Gap)</text>
    <circle cx="252" cy="-14" r="4.5" fill="#2F7A43"/>
    <text x="266" y="-8">Towns we cover</text>
    <text x="0" y="24" font-size="12.5" fill="#5c5a4e">And surrounding areas across the High Country — call for large jobs beyond the county line.</text>
  </g>
</svg>
